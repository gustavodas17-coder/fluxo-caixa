<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div id="auth-area">
        <h1>Login / Cadastro</h1>

        <input type="email" id="email" placeholder="Seu email">
        <input type="password" id="senha" placeholder="Sua senha">

        <button onclick="cadastrar()">Cadastrar</button>
        <button onclick="login()">Entrar</button>
    </div>

    <div id="app-area" style="display:none;">
        <h1>Controle de Fluxo de Caixa</h1>

        <button onclick="logout()">Sair</button>

        <input type="text" id="descricao" placeholder="Descrição do produto">
        <input type="number" id="quantidade" placeholder="Quantidade">
        <input type="number" id="valor" placeholder="Valor unitário">

        <select id="tipo">
            <option value="entrada">Entrada</option>
            <option value="saida">Saída</option>
        </select>

        <button onclick="adicionarTransacao()">Adicionar Transação</button>

        <h2>Saldo Atual: R$ <span id="saldo">0.00</span></h2>

        <h2>Últimas 10 Transações</h2>
        <ul id="lista"></ul>

        <div class="relatorios">
            <h2>Relatório por Período</h2>

            <input type="date" id="dataInicio">
            <input type="date" id="dataFim">

            <button onclick="filtrarPeriodo()">Filtrar</button>

            <div id="relatorio"></div>

            <canvas id="grafico"></canvas>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
